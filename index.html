  }
  g.font='11px monospace';g.fillStyle='#8a8478';
  g.fillText(game.interT>1.2?'PRESS ANY KEY':'',SCR_W/2,330);
  g.textAlign='left';
  game.interT+=TICK;
  if(game.interT>1.2){
    for(const k in pressed)if(pressed[k]){pressed[k]=false;game.startLevel(game.levelIdx+1,true);return;}
    if(game.interT>5)game.startLevel(game.levelIdx+1,true);
  }
}
function drawGameOver(g,t){
  game.drawPlay(g,t);
  g.fillStyle='rgba(0,0,0,0.7)';g.fillRect(PF_X,PF_Y,PF_W,PF_H);
  g.textAlign='center';
  g.font='bold 34px Georgia,serif';g.fillStyle='#d84040';g.fillText('GAME OVER',SCR_W/2,160);
  g.font='bold 14px monospace';g.fillStyle='#f0e8d8';
  g.fillText('SCORE: '+String(game.runners[0].score).padStart(7,'0'),SCR_W/2,200);
  g.font='12px monospace';g.fillStyle='#b8a878';
  g.fillText('ENTER: CONTINUE (5 lives, score kept) \u00b7 ESC: MENU',SCR_W/2,240);
  g.textAlign='left';
  if(tap('Enter')){
    const sc=game.runners.map(r=>r.score);
    game.startLevel(game.levelIdx,false);
    game.runners.forEach((r,i)=>{r.score=sc[i];});
  }
  if(tap('Escape')){game.state='menu';startMusic(10);}
}
function drawFinale(g,t){
  g.drawImage(stoneBg,0,0);
  g.fillStyle='rgba(20,16,12,0.82)';g.fillRect(0,0,SCR_W,SCR_H);
  g.textAlign='center';
  g.font='bold 15px monospace';g.fillStyle='#b8a878';g.fillText('\u2014 THE LAST HAUL \u2014',SCR_W/2,120);
  g.font='bold 38px Georgia,serif';
  const grd=g.createLinearGradient(0,140,0,180);
  grd.addColorStop(0,'#ffe9a0');grd.addColorStop(1,'#8a6216');
  g.fillStyle=grd;g.fillText('COLE CARVER ESCAPES!',SCR_W/2,170);
  g.font='14px monospace';g.fillStyle='#f0e8d8';
  g.fillText('The vaults of the Miser King lie empty.',SCR_W/2,210);
  g.fillText('SCORE: '+String(game.runners[0]?game.runners[0].score:0).padStart(7,'0')
    +'   LIVES LEFT: '+(game.runners[0]?Math.max(0,game.runners[0].lives):0),SCR_W/2,244);
  // celebrating hero + fleeing wraiths
  drawRunner(g,SCR_W/2-11,280,Math.floor(t*4)%2?'run1':'stand',1,'#e8e8e8',t);
  drawMonk(g,SCR_W/2-90+Math.sin(t)*4,284,'run1',-1,t,false);
  drawMonk(g,SCR_W/2+70-Math.sin(t)*4,284,'run2',1,t,false);
  g.font='12px monospace';g.fillStyle='#b8a878';g.fillText('ESC: MENU',SCR_W/2,350);
  g.textAlign='left';
  if(tap('Escape')||tap('Enter')){game.state='menu';startMusic(10);}
}
function drawPause(g,t){
  game.drawPlay(g,t);
  g.fillStyle='rgba(0,0,0,0.55)';g.fillRect(PF_X,PF_Y,PF_W,PF_H);
  g.textAlign='center';g.font='bold 26px Georgia,serif';g.fillStyle='#ffe9a0';
  g.fillText('PAUSED',SCR_W/2,190);
  g.font='12px monospace';g.fillStyle='#e8e0d0';g.fillText('P: RESUME',SCR_W/2,220);
  g.textAlign='left';
  if(tap('KeyP'))game.state='play';
}

// ------------------------------------------------ GAME GENERATOR (level editor)
const ED={
  grid:null, world:0, dark:false, title:'MY LEVEL', sel:'#', mode:'edit', savedMsg:0,
  PAL:['#','@','~','!','H','h','=','1','2','3','4','o','g','r','O','G','R',
       'A','a','X','D','U','J','W','M','b','B','s','n','j','f','p','.'],
  PALN:{'#':'turf','@':'bedrock','~':'tar','!':'trapdoor','H':'ladder','h':'exit ladder','=':'bar',
    '1':'gold 1','2':'gold 2','3':'gold 3','4':'gold 4','o':'key','g':'key','r':'key',
    'O':'door','G':'door','R':'door','A':'transporter in','a':'transporter out','b':'small bomb','B':'boss bomb',
    'X':'exit','D':'wraith gate','U':'hideout','J':'hero','W':'partner',
    'M':'wraith','s':'slime','n':'snare','j':'jackhammer','f':'gas','p':'pickaxe','.':'erase'},
  enter(){
    game.state='editor';
    if(!this.grid)this.load()||this.blank();
  },
  blank(){
    this.grid=[];
    for(let y=0;y<ROWS;y++)this.grid.push(new Array(COLS).fill('.'));
    for(let x=0;x<COLS;x++)this.grid[ROWS-1][x]='#';
    this.grid[ROWS-2][1]='J'; this.grid[ROWS-2][COLS-2]='M'; this.grid[2][COLS-2]='X'; this.grid[ROWS-2][14]='1';
    return true;
  },
  toDef(){
    return {world:this.world,title:this.title,dark:this.dark,map:this.grid.map(r=>r.join(''))};
  },
  save(){
    try{localStorage.setItem('lrtlr_custom',JSON.stringify({world:this.world,dark:this.dark,title:this.title,grid:this.grid}));
      this.savedMsg=2;}catch(e){}
  },
  load(){
    try{
      const d=JSON.parse(localStorage.getItem('lrtlr_custom'));
      if(!d)return false;
      this.world=d.world;this.dark=d.dark;this.title=d.title;this.grid=d.grid;
      return true;
    }catch(e){return false;}
  },
  valid(){
    const flat=this.grid.flat().join('');
    return flat.includes('J')&&flat.includes('M')&&flat.includes('X')&&/[1234]/.test(flat);
  },
  update(g,t){
    // palette strip at top
    g.drawImage(backdrops[this.world],PF_X,PF_Y);
    g.fillStyle='rgba(0,0,0,0.25)';g.fillRect(PF_X,PF_Y,PF_W,PF_H);
    for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++){
      const ch=this.grid[y][x], dx=PF_X+x*TILE, dy=PF_Y+y*TILE;
      this.drawCh(g,ch,dx,dy,t);
    }
    // grid lines
    g.strokeStyle='rgba(255,255,255,0.06)';
    for(let x=0;x<=COLS;x++){g.beginPath();g.moveTo(PF_X+x*TILE,PF_Y);g.lineTo(PF_X+x*TILE,PF_Y+PF_H);g.stroke();}
    for(let y=0;y<=ROWS;y++){g.beginPath();g.moveTo(PF_X,PF_Y+y*TILE);g.lineTo(PF_X+PF_W,PF_Y+y*TILE);g.stroke();}
    g.drawImage(frameCanvas,0,0);
    // palette in HUD
    g.fillStyle='#33302c';g.fillRect(4,HUD_Y+4,SCR_W-8,32);
    this.PAL.forEach((ch,i)=>{
      const bx=8+i*16, by=HUD_Y+8;
      if(ch===this.sel){g.fillStyle='#ffe9a0';g.fillRect(bx-2,by-2,16,26);}
      g.fillStyle='#1c1a18';g.fillRect(bx-1,by-1,14,24);
      g.save();g.translate(bx,by);g.scale(0.55,0.55);this.drawCh(g,ch,0,0,t,true);g.restore();
      if(mouse.click&&mouse.x>bx-2&&mouse.x<bx+14&&mouse.y>by-2&&mouse.y<by+24){this.sel=ch;mouse.click=false;SFX.click();}
    });
    // paint
    if(mouse.down&&mouse.x>PF_X&&mouse.x<PF_X+PF_W&&mouse.y>PF_Y&&mouse.y<PF_Y+PF_H){
      const gx=Math.floor((mouse.x-PF_X)/TILE), gy=Math.floor((mouse.y-PF_Y)/TILE);
      if(this.sel==='J'||this.sel==='W'||this.sel==='X'){ // unique parts
        for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++)if(this.grid[y][x]===this.sel)this.grid[y][x]='.';
      }
      if(this.sel==='M'){let c=0;this.grid.flat().forEach(ch=>{if(ch==='M')c++;});if(c>=10&&this.grid[gy][gx]!=='M')return;}
      this.grid[gy][gx]=this.sel;
    }
    // status line
    g.font='10px monospace';g.textAlign='center';g.fillStyle='#cabfa8';
    g.fillText(`GAME GENERATOR \u2014 "${this.title}" \u00b7 WORLD ${this.world+1} ${WORLDS[this.world].name.toUpperCase()}${this.dark?' \u263e':''} \u00b7 brush: ${this.PALN[this.sel]||this.sel}`,SCR_W/2,PF_Y+10);
    g.fillText('T TEST \u00b7 V SAVE \u00b7 L LOAD \u00b7 W WORLD \u00b7 K DARK \u00b7 E TITLE \u00b7 X EXPORT \u00b7 I IMPORT \u00b7 ESC MENU'+(this.savedMsg>0?'  \u2714 SAVED':''),SCR_W/2,PF_Y+PF_H-4);
    g.textAlign='left';
    if(this.savedMsg>0)this.savedMsg-=TICK;
    // keys
    if(tap('KeyW')){this.world=(this.world+1)%10;}
    if(tap('KeyK')){this.dark=!this.dark;}
    if(tap('KeyV'))this.save();
    if(tap('KeyL'))this.load();
    if(tap('KeyE')){const s=prompt('Level title:',this.title);if(s)this.title=s.toUpperCase().slice(0,24);}
    if(tap('KeyX')){prompt('Copy your level JSON:',JSON.stringify(this.toDef()));}
    if(tap('KeyI')){
      const s=prompt('Paste level JSON:');
      if(s)try{const d=JSON.parse(s);this.world=d.world|0;this.dark=!!d.dark;this.title=d.title||'IMPORTED';
        this.grid=d.map.map(r=>{const a=r.split('').slice(0,COLS);while(a.length<COLS)a.push('.');return a;});}catch(e){alert('Bad JSON');}
    }
    if(tap('KeyT')){
      if(!this.valid()){alert('A level needs: a hero (J), a wraith (M), treasure (1-4), and an exit door (X).');return;}
      this.save();
      game.customLevels=[this.toDef()];
      game.playingCustom=true; game.twoP=this.grid.flat().includes('W');
      game.startLevel(0,false);
      game.fromEditor=true;
    }
    if(tap('Escape')){game.state='menu';}
  },
  drawCh(g,ch,dx,dy,t,pal){
    const w=this.world;
    if(TERR_CH[ch]!==undefined&&ch!=='X'){
      let tt=TERR_CH[ch];
      if(tt===T_HLADDER){g.globalAlpha=0.4;drawTerrainTile(g,w,T_LADDER,dx,dy);g.globalAlpha=1;return;}
      if(tt===T_TRAP){drawTerrainTile(g,w,T_TURF,dx,dy);g.fillStyle='rgba(0,0,0,0.35)';g.fillRect(dx+6,dy+6,10,10);return;}
      drawTerrainTile(g,w,tt,dx,dy);return;
    }
    if(ch==='X'){drawTerrainTile(g,w,T_EXIT,dx,dy);return;}
    if(ITEM_CH[ch]){drawItem(g,ITEM_CH[ch],dx,dy,t);return;}
    if(ch==='J'){drawRunner(g,dx,dy,'stand',1,'#e8e8e8',0);return;}
    if(ch==='W'){drawRunner(g,dx,dy,'stand',1,'#3868d8',0);return;}
    if(ch==='M'){drawMonk(g,dx,dy,'stand',1,0,false);return;}
    if(ch==='A'){drawTerrainTile(g,w,T_TELIN,dx,dy);return;}
    if(ch==='a'){drawTerrainTile(g,w,T_TELOUT,dx,dy);return;}
    if(pal&&ch==='.'){g.strokeStyle='#a04040';g.beginPath();g.moveTo(dx+4,dy+4);g.lineTo(dx+18,dy+18);g.moveTo(dx+18,dy+4);g.lineTo(dx+4,dy+18);g.stroke();}
  },
};

// ------------------------------------------------ main loop & boot
let last=0, acc=0;
function frame(ts){
  requestAnimationFrame(frame);
  const t=ts/1000;
  let dt=Math.min(0.1,t-(last||t)); last=t; acc+=dt;
  let stepped=false;
  while(acc>=TICK){
    acc-=TICK; stepped=true;
    if(game.state==='play')game.updatePlay(TICK);
    else if(game.state==='menu')updateMenu();
  }
  ctx.fillStyle='#000';ctx.fillRect(0,0,SCR_W,SCR_H);
  switch(game.state){
    case 'menu': drawTitle(ctx,t); break;
    case 'picker': drawPicker(ctx,t); break;
    case 'options': drawOptions(ctx); break;
    case 'help': drawHelp(ctx); break;
    case 'play': game.drawPlay(ctx,t);
      if(game.fromEditor&&tap('Escape')){game.fromEditor=false;game.playingCustom=false;ED.enter();}
      break;
    case 'pause': drawPause(ctx,t); break;
    case 'inter': drawInter(ctx,t); break;
    case 'gameover': drawGameOver(ctx,t); break;
    case 'finale': drawFinale(ctx,t); break;
    case 'editor': ED.update(ctx,t); break;
  }
  mouse.click=false;
  // only clear buffered taps once a sim step consumed them (protects 120Hz+ displays);
  // non-play/menu states consume taps in their draw call every frame.
  if(stepped||(game.state!=='play'&&game.state!=='menu'))for(const k in pressed)pressed[k]=false;
}
buildAtlases(); buildBackdrops(); buildFrame(); buildStoneBg();
const _origUnlock=Audio_unlock;
Audio_unlock=function(){const had=!!AC;_origUnlock();if(!had&&AC&&game.state==='menu')startMusic(10);};
requestAnimationFrame(frame);
</script>
